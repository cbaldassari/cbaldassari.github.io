<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Cristiano Baldassari</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script>
    (function(){var s=localStorage.getItem('theme'),d=window.matchMedia('(prefers-color-scheme:dark)').matches;if(s==='dark'||(!s&&d))document.documentElement.setAttribute('data-theme','dark');})();
    </script>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page {
            max-width: 600px;
            margin: 0 auto;
            padding: 200px 24px 80px;
            text-align: center;
        }
        .error-page h1 {
            font-size: 6rem;
            font-weight: 800;
            letter-spacing: -4px;
            color: var(--color-primary);
            margin-bottom: 0;
        }
        .error-page p {
            font-size: 1.1rem;
            color: var(--color-text-secondary);
            margin: 16px 0 40px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            font-weight: 550;
        }
    </style>
</head>
<body>

    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-bracket">{</span>CB<span class="logo-bracket">}</span>
            </a>
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="error-page">
        <h1>404</h1>
        <p>This page does not exist.</p>
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to homepage
        </a>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 Cristiano Baldassari</p>
            <a href="privacy.html" class="footer-link">Privacy Policy</a>
        </div>
    </footer>

    <script>
    const themeToggle = document.getElementById('theme-toggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const next = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });
    }
    </script>
</body>
</html>
